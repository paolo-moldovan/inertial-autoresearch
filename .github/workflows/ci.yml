name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Ruff
        run: ./.venv/bin/ruff check src tests autoresearch_loop scripts

      - name: Mypy
        run: ./.venv/bin/mypy autoresearch_loop src/imu_denoise/data src/imu_denoise/training src/imu_denoise/cli tests

      - name: Unit tests
        run: ./.venv/bin/python -m pytest tests/unit
