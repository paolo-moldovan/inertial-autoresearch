name: default

device:
  preferred: auto
  dtype: float32
  compile: false

data:
  dataset: euroc
  window_size: 200
  stride: 100
  normalize: true
  augment: true
  data_dir: data

training:
  seed: 42
  num_workers: 4

evaluation:
  frequency_epochs: 1
  metrics:
    - rmse
    - mae
    - spectral_divergence
  reconstruction: none
  realtime_mode: false

observability:
  enabled: true
  db_path: artifacts/observability/mission_control.db
  blob_dir: artifacts/observability/blobs
  capture_raw_llm: true
  import_hermes_state: true
  redact_secrets: true
  tui_refresh_hz: 2
  streamlit_port: 8501
  mlflow_enabled: false
  mlflow_tracking_uri: file:./artifacts/mlruns
  mlflow_experiment_name: imu-mission-control
  mlflow_log_artifacts: true
  phoenix_enabled: false
  phoenix_project_name: imu-mission-control
  phoenix_endpoint: http://localhost:6006/v1/traces
  phoenix_protocol: http/protobuf
  phoenix_batch: false

output_dir: artifacts
log_dir: artifacts/logs
